services:
  - type: web
    name: child-tracker-kg-bot
    runtime: python
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn api_cloud:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_TEACHER_PASSWORD
        sync: false
      - key: SYNC_SECRET
        sync: false
      - key: LINE_DEFAULT_SCHEME
        value: 甲班
      - key: PYTHON_VERSION
        value: "3.11.9"

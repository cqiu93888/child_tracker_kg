# Fly.io：請把第一行 app 改成你的應用名稱（全小寫、全域唯一）
# 建立 volume 後再部署；詳見 docs/fly-deploy.md
app = "child-tracker-kg"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile.cloud"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

# 先執行：fly volumes create kg_data --app <同上 app> --region nrt --size 1
# 再：fly secrets set CLOUD_DATA_DIR=/data
[[mounts]]
  source = "kg_data"
  destination = "/data"
